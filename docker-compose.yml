services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: portail-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  node-red:
    image: nodered/node-red:latest
    container_name: portail-node-red
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - node_red_data:/data
    depends_on:
      - mosquitto
      - influxdb

  influxdb:
    image: influxdb:2
    container_name: portail-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ChangeMe12345!
      DOCKER_INFLUXDB_INIT_ORG: portail_org
      DOCKER_INFLUXDB_INIT_BUCKET: portail_bucket
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: portail-super-token-123456789

volumes:
  node_red_data:
  influxdb_data:
  influxdb_config:
